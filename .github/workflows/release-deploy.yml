name: Release (bump) + Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-deploy-production
  cancel-in-progress: false

jobs:
  release-deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        !contains(github.event.workflow_run.head_commit.message || '', '[skip ci]') &&
        !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release):')
      )

    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # Evite les courses si plusieurs pushes rapprochés :
      # on ne release/deploy que le commit qui vient d'être validé par CI
      - name: Ensure main still points to validated commit
        if: github.event_name != 'workflow_dispatch'
        id: freshness
        run: |
          git fetch origin main --tags
          CURRENT="$(git rev-parse origin/main)"
          EXPECTED="${{ github.event.workflow_run.head_sha }}"

          echo "current=$CURRENT"
          echo "expected=$EXPECTED"

          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Main moved since CI finished. Skipping (newer CI run will handle release+deploy)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and create tag
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        id: bump
        run: |
          npm version patch -m "chore(release): v%s [skip ci]"
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Released version: $VERSION"

      - name: Push release commit and tag
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: |
          git push origin main --follow-tags

      - name: Install deps
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: npm ci

      - name: Build static export
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: npm run build

      - name: Check output folder
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: |
          test -d out
          ls -la out | head -50

      - name: Show version being deployed
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        run: |
          echo "Deploying ${{ steps.bump.outputs.version || 'manual-run' }}"

      - name: Deploy to Cloudflare Pages (Direct Upload)
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=shiftwell