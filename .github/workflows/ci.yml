name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feat/**
      - feature/**

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      # create-next-app n'a pas toujours un script typecheck
      # next build fait déjà un typecheck TS en pratique
      - name: Build static export
        run: npm run build